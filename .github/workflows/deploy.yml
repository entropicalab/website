name: deploy to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# opt the workflow into node 24 for all bundled javascript actions.
# silences the "actions/checkout@v4, actions/deploy-pages@v4, etc are
# running on node 20" deprecation warnings. github will flip this default
# on june 2 2026; this just gets us there early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install, build, and upload
        uses: withastro/action@v4
        with:
          node-version: 22
          # path defaults to "." — set if the astro project is in a subdir
          # package-manager: npm (auto-detected from package-lock.json)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
